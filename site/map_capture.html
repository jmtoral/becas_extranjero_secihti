<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map Capture</title>
    <style>
      :root {
        --bg: #f6efe6;
        --surface: rgba(255, 251, 246, 0.94);
        --ink: #172126;
        --muted: #62645f;
        --accent: #174c43;
        --accent-2: #c7923c;
        --border: rgba(91, 72, 46, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Aptos", "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(199, 146, 60, 0.18), transparent 30%),
          radial-gradient(circle at top right, rgba(23, 76, 67, 0.1), transparent 22%),
          linear-gradient(180deg, #fbf6f0 0%, #f4ece2 100%);
      }

      .frame {
        width: 1400px;
        min-height: 900px;
        margin: 0 auto;
        padding: 44px 40px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 24px;
        margin-bottom: 22px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 3.6rem;
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .coverage {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: rgba(23, 76, 67, 0.08);
        border: 1px solid rgba(23, 76, 67, 0.12);
        color: var(--accent);
        padding: 8px 14px;
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: 0 24px 64px rgba(91, 72, 46, 0.08);
        padding: 22px 22px 18px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 20px;
        margin-bottom: 16px;
      }

      .panel-title {
        margin: 0;
        font-size: 1.15rem;
        color: var(--accent);
      }

      .panel-subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .world-map-root {
        position: relative;
        min-height: 680px;
      }

      .map-base,
      .bubble-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .world-map-svg,
      .bubble-layer {
        width: 100%;
        height: 100%;
      }

      .world-map-svg [id] {
        fill: rgba(27, 36, 48, 0.08);
        stroke: rgba(27, 36, 48, 0.14);
        stroke-width: 0.6;
      }

      .world-map-svg .is-active-country {
        fill: rgba(23, 76, 67, 0.24);
      }

      .map-bubble {
        fill: rgba(199, 146, 60, 0.45);
        stroke: rgba(199, 146, 60, 0.94);
        stroke-width: 2.2;
      }

      .note {
        margin-top: 16px;
        min-height: 40px;
        color: #7c5f30;
        font-size: 0.94rem;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="header">
        <div>
          <p class="eyebrow">Padrón de becas al extranjero</p>
          <h1 id="year-title">Año</h1>
        </div>
        <div id="coverage-pill" class="coverage">Cobertura</div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Mapa anual de destinos</h2>
          <p class="panel-subtitle">Círculos escalados por número de becas en el país destino</p>
        </div>
        <div id="world-map-root" class="world-map-root"></div>
        <div id="partial-note" class="note"></div>
      </section>
    </div>

    <script src="assets/data/summary.js"></script>
    <script src="assets/data/world-map.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const hashYear = window.location.hash ? Number(window.location.hash.replace(/^#/, "")) : NaN;
      const year = Number.isFinite(hashYear) ? hashYear : Number(params.get("year"));
      const summary = window.__SITE_SUMMARY__ || {};
      const rows = (summary.country_yearly || []).filter((row) => Number(row.source_year) === year);
      const meta = (summary.year_metadata || []).find((row) => Number(row.source_year) === year) || {};

      document.getElementById("year-title").textContent = String(year || "");
      document.getElementById("coverage-pill").textContent = meta.coverage_label || "Cobertura no indicada";
      document.getElementById("partial-note").textContent = meta.is_partial_period
        ? `La fuente publicada para ${year} cubre ${meta.coverage_label || ""}.`
        : "";

      const root = document.getElementById("world-map-root");
      root.innerHTML = `<div class="map-base"></div>`;
      const base = root.querySelector(".map-base");
      base.innerHTML = window.__WORLD_MAP_SVG__ || "";
      const baseSvg = base.querySelector("svg");
      if (!baseSvg) {
        root.textContent = "Mapa no disponible.";
      } else {
        baseSvg.classList.add("world-map-svg");
        const viewBox = (baseSvg.getAttribute("viewBox") || "0 0 800 460")
          .split(/\s+/)
          .map((value) => Number(value));

        const bubbleSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        bubbleSvg.setAttribute("viewBox", viewBox.join(" "));
        bubbleSvg.setAttribute("preserveAspectRatio", "xMidYMid meet");
        bubbleSvg.classList.add("bubble-layer");
        root.appendChild(bubbleSvg);

        const getAnchor = (mapCode) => {
          const target = baseSvg.querySelector(`[id="${mapCode}"]`);
          if (!target) return null;
          const mainland = typeof target.querySelector === "function" ? target.querySelector(".mainland") : null;
          const anchorTarget = mainland || target;
          const bbox = anchorTarget.getBBox();
          return {
            x: bbox.x + bbox.width / 2,
            y: bbox.y + bbox.height / 2,
            target: mainland || target
          };
        };

        const validRows = rows.filter((row) => row.map_code);
        const maxCount = Math.max(...validRows.map((row) => Number(row.scholarship_count || 0)), 1);

        validRows.forEach((row) => {
          const anchor = getAnchor(row.map_code);
          if (!anchor) return;
          anchor.target.classList.add("is-active-country");

          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          const radius = 4 + Math.sqrt(Number(row.scholarship_count || 0) / maxCount) * 28;
          circle.setAttribute("cx", anchor.x);
          circle.setAttribute("cy", anchor.y);
          circle.setAttribute("r", radius.toFixed(2));
          circle.setAttribute("class", "map-bubble");
          bubbleSvg.appendChild(circle);
        });
      }
    </script>
  </body>
</html>
